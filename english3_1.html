<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三年级 Unit 1 单词朗读</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .word-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        .word-item {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .word-item:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }
        .word-item.highlight {
            background-color: #ffeb3b;
            border-color: #ffc107;
        }
        .word-item.selected {
            border-color: #28a745;
            border-width: 2px;
            box-shadow: 0 0 8px rgba(40, 167, 69, 0.3);
        }
        .word-item.selected::after {
            content: "起点";
            position: absolute;
            top: -5px;
            right: 5px;
            background: #28a745;
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 3px;
        }
        button {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            background-color: #0078d4;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #005a9e;
        }
        button.stop {
            background-color: #d83b01;
        }
        input[type="number"] {
            width: 50px;
            padding: 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>三年级 Unit 1 单词朗读</h1>
    <p style="color: #666; font-size: 13px;">提示：点击单词可试听并设为朗读【起点】，然后点击“开始朗读”。</p>
    <hr>

    <div class="controls">
        <label>每词重复：
            <input type="number" id="repeatCount" min="1" max="10" value="2"> 次
        </label>
        
        <label>语速：
            <input type="range" id="speedControl" min="0.5" max="2" step="0.1" value="0.8" oninput="document.getElementById('speedValue').innerText = this.value">
            <span id="speedValue">0.8</span> 
        </label>

        <label>拼读间隔：
            <input type="number" id="spellInterval" min="0" max="2000" step="10" value="50"> 毫秒
        </label>

        <button id="startBtn" onclick="startReading()">开始朗读</button>
        <button class="stop" id="stopBtn" onclick="stopReading()">停止</button>
    </div>

    <div class="word-list" id="wordListContainer"></div>
</div>

<audio id="audioPlayer"></audio>

<script>
    // 1. 单词数据
    const wordsData = [
        { word: "feeling", spell: "f-e-e-l-i-n-g", phonetic: "/ˈfiːlɪŋ/", cn: "感觉" },
        { word: "tired", spell: "t-i-r-e-d", phonetic: "/ˈtaɪəd/", cn: "疲惫的" },
        { word: "sad", spell: "s-a-d", phonetic: "/sæd/", cn: "难过的" },
        { word: "angry", spell: "a-n-g-r-y", phonetic: "/ˈæŋɡri/", cn: "生气的" },
        { word: "scared", spell: "s-c-a-r-e-d", phonetic: "/skeəd/", cn: "害怕的" },
        { word: "cry", spell: "c-r-y", phonetic: "/kraɪ/", cn: "哭" },
        { word: "laugh", spell: "l-a-u-g-h", phonetic: "/lɑːf/", cn: "笑" },
        { word: "stamp", spell: "s-t-a-m-p", phonetic: "/stæmp/", cn: "跺（脚）" },
        { word: "sleep", spell: "s-l-e-e-p", phonetic: "/sliːp/", cn: "睡觉" },
        { word: "new", spell: "n-e-w", phonetic: "/njuː/", cn: "新的" },
        { word: "game", spell: "g-a-m-e", phonetic: "/ɡeɪm/", cn: "游戏" },
        { word: "excited", spell: "e-x-c-i-t-e-d", phonetic: "/ɪkˈsaɪtɪd/", cn: "兴奋的" },
        { word: "sorry", spell: "s-o-r-r-y", phonetic: "/ˈsɒri/", cn: "对不起" },
        { word: "like", spell: "l-i-k-e", phonetic: "/laɪk/", cn: "喜欢" },
        { word: "but", spell: "b-u-t", phonetic: "/bʌt/", cn: "但是" },
        { word: "unhappy", spell: "u-n-h-a-p-p-y", phonetic: "/ʌnˈhæpi/", cn: "不开心的" },
        { word: "worried", spell: "w-o-r-r-i-e-d", phonetic: "/ˈwʌrid/", cn: "担心的" },
        { word: "not", spell: "n-o-t", phonetic: "/nɒt/", cn: "不，不是" },
        { word: "feel", spell: "f-e-e-l", phonetic: "/fiːl/", cn: "感觉到，觉得" },
        { word: "find", spell: "f-i-n-d", phonetic: "/faɪnd/", cn: "找到" },
        { word: "doll", spell: "d-o-l-l", phonetic: "/dɒl/", cn: "玩偶" },
        { word: "football", spell: "f-o-o-t-b-a-l-l", phonetic: "/ˈfʊtbɔːl/", cn: "足球" },
        { word: "eat", spell: "e-a-t", phonetic: "/iːt/", cn: "吃" },
        { word: "his", spell: "h-i-s", phonetic: "/hɪz/", cn: "他的" },
        { word: "cake", spell: "c-a-k-e", phonetic: "/keɪk/", cn: "蛋糕" },
        { word: "big", spell: "b-i-g", phonetic: "/bɪɡ/", cn: "大的" },
        { word: "mouse", spell: "m-o-u-s-e", phonetic: "/maʊs/", cn: "老鼠" }
    ];

    const audio = document.getElementById('audioPlayer');
    const wordListContainer = document.getElementById('wordListContainer');
    
    let isPlaying = false;
    let currentIndex = 0;
    let currentRepeat = 0;
    let startFromIndex = 0; 
    let voices = [];

    window.speechSynthesis.onvoiceschanged = () => {
        voices = window.speechSynthesis.getVoices();
    };

    // 2. 渲染单词列表到页面上
    function renderWords() {
        wordListContainer.innerHTML = '';
        wordsData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'word-item';
            div.id = `word-${index}`;
            div.innerHTML = `
                <strong>${item.word}</strong><br>
                <span style="color:#666; font-size:12px">${item.spell}</span><br>
                <span style="color:#0078d4">${item.phonetic}</span> ${item.cn}
            `;
            
            div.onclick = () => {
                playSingleWordAudio(item.word);
                startFromIndex = index;
                document.querySelectorAll('.word-item').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
            };
            
            wordListContainer.appendChild(div);
        });
        
        document.getElementById('word-0').classList.add('selected');
    }

    // 辅助函数：用浏览器自带语音朗读中文
    function speakText(text, speed, callback) {
        window.speechSynthesis.cancel(); 
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = speed;
        utterance.voice = voices.find(v => v.lang === 'zh-CN') || voices.find(v => v.lang.startsWith('zh'));
        utterance.onend = callback;
        window.speechSynthesis.speak(utterance);
    }

    // 辅助函数：逐个字母朗读拼写，完全自己控制节奏
    function speakSpelling(spellStr, speed, callback) {
        const letters = spellStr.split('-'); // 拆分成字母数组
        let index = 0;

        // 获取用户输入的拼读间隔时间，默认50
        const interval = parseInt(document.getElementById('spellInterval').value) || 0;

        function speakNextLetter() {
            if (!isPlaying) return; // 如果中途被停止，直接中断

            if (index < letters.length) {
                const letter = letters[index];
                const utterance = new SpeechSynthesisUtterance(letter);
                utterance.rate = speed;
                utterance.lang = 'en-US';
                utterance.voice = voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en'));
                
                // 读完一个字母后的回调
                utterance.onend = () => {
                    if (!isPlaying) return;
                    index++;
                    // 核心：使用用户设置的间隔时间
                    setTimeout(speakNextLetter, interval); 
                };
                
                window.speechSynthesis.speak(utterance);
            } else {
                // 所有字母读完，执行原有逻辑
                callback();
            }
        }

        window.speechSynthesis.cancel();
        speakNextLetter(); // 开始读第一个字母
    }

    // 3. 核心播放逻辑：单词音频 -> 逐个字母拼写 -> 中文
    function playWord(item, repeatTimes, speed, index) {
        if (!isPlaying) return;

        document.querySelectorAll('.word-item').forEach(el => el.classList.remove('highlight'));
        const currentEl = document.getElementById(`word-${index}`);
        if (currentEl) currentEl.classList.add('highlight');

        // 步骤1：播放有道词典单词发音
        audio.src = `https://dict.youdao.com/dictvoice?audio=${item.word}&type=2`;
        audio.playbackRate = speed;
        
        audio.onended = function() {
            if (!isPlaying) return;
            
            // 步骤2：单词音频播完，延时 300ms 调用逐字母拼写
            setTimeout(() => {
                speakSpelling(item.spell, speed, () => {
                    if (!isPlaying) return;
                    
                    // 步骤3：拼写播完，延时 300ms 读中文
                    setTimeout(() => {
                        speakText(item.cn, speed, () => {
                            if (!isPlaying) return;
                            
                            // 步骤4：中文播完，判断是否需要重复或读下一个
                            currentRepeat++;
                            if (currentRepeat >= repeatTimes) {
                                currentRepeat = 0;
                                currentIndex++;
                                
                                if (currentIndex < wordsData.length) {
                                    setTimeout(() => {
                                        playWord(wordsData[currentIndex], repeatTimes, speed, currentIndex);
                                    }, 500);
                                } else {
                                    console.log("全部朗读完毕");
                                    isPlaying = false;
                                    document.querySelectorAll('.word-item').forEach(el => el.classList.remove('highlight'));
                                }
                            } else {
                                setTimeout(() => {
                                    playWord(item, repeatTimes, speed, index);
                                }, 300);
                            }
                        });
                    }, 300);
                });
            }, 300);
        };
        
        audio.play();
    }

    function playSingleWordAudio(word) {
        isPlaying = false; 
        window.speechSynthesis.cancel();
        audio.pause();
        audio.currentTime = 0;
        
        audio.src = `https://dict.youdao.com/dictvoice?audio=${word}&type=2`;
        audio.playbackRate = parseFloat(document.getElementById('speedControl').value);
        audio.play();
    }

    function startReading() {
        stopReading(); 
        
        isPlaying = true;
        currentIndex = startFromIndex; 
        currentRepeat = 0;
        
        // 确保重复次数在 1-10 之间
        let repeatTimes = parseInt(document.getElementById('repeatCount').value);
        if (isNaN(repeatTimes) || repeatTimes < 1) repeatTimes = 1;
        if (repeatTimes > 10) repeatTimes = 10;
        
        const speed = parseFloat(document.getElementById('speedControl').value);
        
        playWord(wordsData[currentIndex], repeatTimes, speed, currentIndex);
    }

    function stopReading() {
        isPlaying = false;
        audio.pause();
        audio.currentTime = 0;
        window.speechSynthesis.cancel(); 
        document.querySelectorAll('.word-item').forEach(el => el.classList.remove('highlight'));
    }

    renderWords();
</script>

</body>
</html>
