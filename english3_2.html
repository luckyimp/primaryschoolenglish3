<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三年级 Unit 2 单词朗读</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>三年级 Unit 2 单词朗读</h1>
    <p style="color: #666; font-size: 13px;">提示：点击单词可试听并设为朗读【起点】，然后点击"开始朗读"。</p>
    <hr>

    <div class="controls">
        <label>每词重复：
            <input type="number" id="repeatCount" min="1" max="10" value="2"> 次
        </label>
        
        <label>语速：
            <input type="range" id="speedControl" min="0.5" max="2" step="0.1" value="0.8" oninput="document.getElementById('speedValue').innerText = this.value">
            <span id="speedValue">0.8</span> 
        </label>

        <label>拼读间隔：
            <input type="number" id="spellInterval" min="0" max="2000" step="10" value="50"> 毫秒
        </label>

        <button id="startBtn" onclick="startReading()">开始朗读</button>
        <button class="stop" id="stopBtn" onclick="stopReading()">停止</button>
    </div>

    <div class="word-list" id="wordListContainer"></div>
</div>

<audio id="audioPlayer"></audio>

<script src="script.js"></script>
<script>
    // Unit 2 单词数据
    const unit2Words = [
        { word: "know", spell: "k-n-o-w", phonetic: "/noʊ/", cn: "了解" },
        { word: "body", spell: "b-o-d-y", phonetic: "/ˈbɑːdi/", cn: "身体；躯干" },
        { word: "rock", spell: "r-o-c-k", phonetic: "/rɒk/", cn: "摇滚乐" },
        { word: "song", spell: "s-o-n-g", phonetic: "/sɒŋ/", cn: "歌曲" },
        { word: "touch", spell: "t-o-u-c-h", phonetic: "/tʌtʃ/", cn: "触摸" },
        { word: "head", spell: "h-e-a-d", phonetic: "/hed/", cn: "头" },
        { word: "eye", spell: "e-y-e", phonetic: "/aɪ/", cn: "眼睛" },
        { word: "hair", spell: "h-a-i-r", phonetic: "/heə/", cn: "头发" },
        { word: "ear", spell: "e-a-r", phonetic: "/ɪə/", cn: "耳朵" },
        { word: "wave", spell: "w-a-v-e", phonetic: "/weɪv/", cn: "摆动" },
        { word: "leg", spell: "l-e-g", phonetic: "/leɡ/", cn: "腿" },
        { word: "foot", spell: "f-o-o-t", phonetic: "/fʊt/", cn: "脚" },
        { word: "nose", spell: "n-o-s-e", phonetic: "/nəʊz/", cn: "鼻子" },
        { word: "face", spell: "f-a-c-e", phonetic: "/feɪs/", cn: "脸" },
        { word: "arm", spell: "a-r-m", phonetic: "/ɑːm/", cn: "手臂" },
        { word: "hand", spell: "h-a-n-d", phonetic: "/hænd/", cn: "手" },
        { word: "mouth", spell: "m-o-u-t-h", phonetic: "/maʊθ/", cn: "嘴" },
        { word: "tooth", spell: "t-o-o-t-h", phonetic: "/tuːθ/", cn: "牙" },

        { word: "Mr", spell: "M-r", phonetic: "/ˈmɪstə/", cn: "先生" },
        { word: "back", spell: "b-a-c-k", phonetic: "/bæk/", cn: "回到原处" },
        { word: "worry", spell: "w-o-r-r-y", phonetic: "/ˈwʌri/", cn: "担心" },
        { word: "short", spell: "s-h-o-r-t", phonetic: "/ʃɔːt/", cn: "短的" },
        { word: "small", spell: "s-m-a-l-l", phonetic: "/smɔːl/", cn: "小的" },
        { word: "robot", spell: "r-o-b-o-t", phonetic: "/ˈrəʊbɒt/", cn: "机器人" }
    ];

    // 初始化
    init(unit2Words);
</script>

</body>
</html>
