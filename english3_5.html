<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三年级 Unit 5 单词朗读</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>三年级 Unit 5 单词朗读</h1>
    <p style="color: #666; font-size: 13px;">提示：点击单词可试听并设为朗读【起点】，然后点击"开始朗读"。</p>
    <hr>

    <div class="controls">
        <label>每词重复：
            <input type="number" id="repeatCount" min="1" max="10" value="2"> 次
        </label>
        
        <label>语速：
            <input type="range" id="speedControl" min="0.5" max="2" step="0.1" value="0.8" oninput="document.getElementById('speedValue').innerText = this.value">
            <span id="speedValue">0.8</span> 
        </label>

        <label>拼读间隔：
            <input type="number" id="spellInterval" min="0" max="2000" step="10" value="50"> 毫秒
        </label>

        <button id="startBtn" onclick="startReading()">开始朗读</button>
        <button class="stop" id="stopBtn" onclick="stopReading()">停止</button>
    </div>

    <div class="word-list" id="wordListContainer"></div>
</div>

<audio id="audioPlayer"></audio>

<script src="script.js"></script>
<script>
    // Unit 5 单词数据
    const unit5Words = [
        { word: "week", spell: "w-e-e-k", phonetic: "/wiːk/", cn: "星期" },
        { word: "Monday", spell: "M-o-n-d-a-y", phonetic: "/ˈmʌndeɪ/", cn: "星期一" },
        { word: "Tuesday", spell: "T-u-e-s-d-a-y", phonetic: "/ˈtjuːzdeɪ/", cn: "星期二" },
        { word: "Wednesday", spell: "W-e-d-n-e-s-d-a-y", phonetic: "/ˈwenzdeɪ/", cn: "星期三" },
        { word: "Thursday", spell: "T-h-u-r-s-d-a-y", phonetic: "/ˈθɜːzdeɪ/", cn: "星期四" },
        { word: "Friday", spell: "F-r-i-d-a-y", phonetic: "/ˈfraɪdeɪ/", cn: "星期五" },
        { word: "Saturday", spell: "S-a-t-u-r-d-a-y", phonetic: "/ˈsætədeɪ/", cn: "星期六" },
        { word: "Sunday", spell: "S-u-n-d-a-y", phonetic: "/ˈsʌndeɪ/", cn: "星期日" },
        { word: "before", spell: "b-e-f-o-r-e", phonetic: "/bɪˈfɔː/", cn: "在……以前" },
        { word: "room", spell: "r-o-o-m", phonetic: "/ruːm/", cn: "房间" },
        { word: "close", spell: "c-l-o-s-e", phonetic: "/kləʊs/", cn: "关，闭合" },
        { word: "much", spell: "m-u-c-h", phonetic: "/mʌtʃ/", cn: "非常" },
        { word: "of course", spell: "o-f c-o-u-r-s-e", phonetic: "/ɒv kɔːs/", cn: "当然" },
        { word: "rabbit", spell: "r-a-b-b-i-t", phonetic: "/ˈræbɪt/", cn: "兔" },

    // 初始化
    init(unit5Words);

</body>
</html>
